<div [class]="model.cssClasses.root" (keydown)="model.onKeyDown($event)" #contentElement>
  <div [class]="model.cssClasses.colorSwatch">
    <svc-swatch
      [className]="model.getSwatchCss()"
      [swatchIcon]="model.cssClasses.swatchIcon"
      [iconClassName]="model.cssClasses.iconClassName"
      [color]="model.renderedValue"
      [showIcon]="true"
      [colorInputValue]="model.renderedColorValue"
      [colorInputClassName]="model.cssClasses.colorInput"
      [inputDisabled]="model.isInputReadOnly"
      [colorInputChange]="model.onColorInputChange.bind(model)"
      [arias]="swatchArias">
    </svc-swatch>
  </div>
  <input autocomplete="off" [disabled]="model.isInputReadOnly" [attr.id]="model.inputId"
    [attr.aria-required]="model.a11y_input_ariaRequired" [attr.aria-labelledby]="model.a11y_input_ariaLabelledBy"
    [attr.aria-label]="model.a11y_input_ariaLabel" [attr.aria-invalid]="model.a11y_input_ariaInvalid"
    [attr.aria-describedby]="model.a11y_input_ariaDescribedBy" (change)="model.onChange($event)"
    (keyup)="model.onKeyUp($event)" (blur)="model.onBlur($event)" (beforeinput)="model.onBeforeInput($event)"
    [value]="model.renderedValue" [class]="model.cssClasses.control" />
  <sv-ng-action-bar *ngIf="model.hasVisibleInputActions" [model]="model.inputActionsContainer"></sv-ng-action-bar>
</div>
