<ng-template #template>
  <div [class]="model.getActionBarItemCss()" [key2click] (click)="addNewQuestion($event)"
    (mouseover)="adorner.hoverStopper && adorner.hoverStopper($event, $event.currentTarget)">
    <span [class]="model.getActionBarItemTitleCss()">
      {{ adorner.addNewQuestionText }}
    </span>
    <div [class]="model.cssClasses.itemTypeSelector">
      <ng-template [component]="{ name: 'sv-action-bar-item-dropdown', data: { model: model.data.questionTypeSelectorModel } }"></ng-template>
    </div>
  </div>
</ng-template>
